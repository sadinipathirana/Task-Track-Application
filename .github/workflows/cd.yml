name: CD

# Runs after CI succeeds on main, so we never publish an image or trigger a
# deploy from code that failed lint/tests.
on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push Docker images
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:latest
            ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL }}
          tags: |
            ghcr.io/${{ github.repository }}-frontend:latest
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: meta
        run: echo "backend_image=ghcr.io/${{ github.repository }}-backend:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  # The frontend is deployed by Vercel's own GitHub integration (connected
  # separately in the Vercel dashboard with Root Directory set to `frontend`),
  # so there is no frontend deploy job here — only the backend needs an
  # explicit deploy step, since Azure doesn't watch the repo on its own.
  deploy-backend-to-azure:
    name: Deploy backend to Azure App Service
    needs: build-and-push
    runs-on: ubuntu-latest
    # Off by default so this never fails CI/CD for anyone who hasn't set up
    # Azure yet. Enable by setting the repo variable ENABLE_AZURE_DEPLOY=true
    # and adding the AZURE_WEBAPP_NAME / AZURE_WEBAPP_PUBLISH_PROFILE secrets
    # (Settings -> Secrets and variables -> Actions).
    if: ${{ vars.ENABLE_AZURE_DEPLOY == 'true' }}
    steps:
      - name: Deploy container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ needs.build-and-push.outputs.backend_image }}
